<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
.chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 999px;
  border: 1px solid #27272a; background: #18181b;
  color: #e4e4e7; font-size: 12px; line-height: 1; white-space: nowrap;
  text-decoration: none;
}
.chip:hover { border-color: #3f3f46; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: #71717a; }
.chip.ok .dot   { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.18); }
.chip.warn      { border-color: #854d0e; background: #1f1808; color: #fde68a; }
.chip.warn .dot { background: #eab308; box-shadow: 0 0 0 3px rgba(234,179,8,0.22); }
.chip.crit      { border-color: #7f1d1d; background: #1f0b0b; color: #fecaca; }
.chip.crit .dot { background: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.25); }
.chip.idle { color: #a1a1aa; }
.role { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-vdim); font-weight: 600; }
</style></head><body>
<div class="preview-card">
  <div class="role">status chip — links to status.claude.com</div>
  <div class="row">
    <a class="chip ok"><span class="dot"></span><span>All Systems Operational</span></a>
    <a class="chip warn"><span class="dot"></span><span>Investigating elevated errors</span></a>
    <a class="chip crit"><span class="dot"></span><span>Major outage — login</span></a>
    <a class="chip idle"><span class="dot"></span><span>Polling…</span></a>
  </div>
  <div class="dim" style="font-size:11px;line-height:1.5;">
    Pill border + dot aura, polled every 5min. Whole-page background tints to match (warn/crit only).
  </div>
</div>
</body></html>
