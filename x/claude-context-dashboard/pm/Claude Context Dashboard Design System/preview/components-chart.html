<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.chart-wrap { background: #0e0e10; border: 1px solid #27272a; border-radius: 8px; padding: 4px; }
.role { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-vdim); font-weight: 600; }
.legend-strokes { display: flex; flex-wrap: wrap; gap: 18px; padding: 8px 6px 0; font-size: 11px; color: var(--fg-muted); }
.legend-strokes svg { vertical-align: -2px; margin-right: 6px; }
</style></head><body>
<div class="preview-card">
  <div class="role">context chart — solid context · dotted cumulative · long-dash thresholds</div>
  <div class="chart-wrap">
    <svg viewBox="0 0 660 260" width="100%" height="220">
      <defs>
        <linearGradient id="b-ok"   x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#22c55e" stop-opacity="0.1"/><stop offset="1" stop-color="#22c55e" stop-opacity="0"/></linearGradient>
        <linearGradient id="b-warn" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eab308" stop-opacity="0.1"/><stop offset="1" stop-color="#eab308" stop-opacity="0"/></linearGradient>
        <linearGradient id="b-high" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f97316" stop-opacity="0.1"/><stop offset="1" stop-color="#f97316" stop-opacity="0"/></linearGradient>
        <linearGradient id="b-crit" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ef4444" stop-opacity="0.12"/><stop offset="1" stop-color="#ef4444" stop-opacity="0"/></linearGradient>
      </defs>
      <g transform="translate(56,16)">
        <!-- bands -->
        <rect x="0" y="160" width="540" height="40" fill="url(#b-ok)"/>
        <rect x="0" y="120" width="540" height="40" fill="url(#b-warn)"/>
        <rect x="0" y="60"  width="540" height="60" fill="url(#b-high)"/>
        <rect x="0" y="0"   width="540" height="60" fill="url(#b-crit)"/>
        <!-- gridlines -->
        <g stroke="#27272a" stroke-dasharray="3 3">
          <line x1="0" y1="40"  x2="540" y2="40"/>
          <line x1="0" y1="80"  x2="540" y2="80"/>
          <line x1="0" y1="120" x2="540" y2="120"/>
          <line x1="0" y1="160" x2="540" y2="160"/>
          <line x1="135" y1="0" x2="135" y2="200"/>
          <line x1="270" y1="0" x2="270" y2="200"/>
          <line x1="405" y1="0" x2="405" y2="200"/>
        </g>
        <!-- threshold lines: long dashes, severity color -->
        <line x1="0" y1="60" x2="540" y2="60" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="14 8" stroke-opacity="0.85"/>
        <line x1="0" y1="120" x2="540" y2="120" stroke="#f97316" stroke-width="1.5" stroke-dasharray="14 8" stroke-opacity="0.85"/>
        <line x1="0" y1="160" x2="540" y2="160" stroke="#eab308" stroke-width="1.5" stroke-dasharray="14 8" stroke-opacity="0.85"/>
        <!-- session 1 (Critical) — solid context -->
        <path d="M0,180 L60,178 L60,150 L120,150 L120,130 L180,130 L180,100 L240,100 L240,80 L300,80 L300,40 L360,40 L360,90 L420,90 L420,55 L480,55 L480,30 L540,30"
              stroke="#fca5a5" fill="none" stroke-width="2"/>
        <!-- session 1 — dotted cumulative (round caps, 1 4 spacing) -->
        <path d="M0,195 L60,192 L60,184 L120,184 L120,170 L180,170 L180,150 L240,150 L240,134 L300,134 L300,114 L360,114 L360,100 L420,100 L420,88 L480,88 L480,72 L540,72"
              stroke="#fca5a5" fill="none" stroke-width="1.6" stroke-dasharray="0.1 5" stroke-linecap="round" stroke-opacity="0.95"/>
        <!-- session 2 (Large) -->
        <path d="M0,170 L80,168 L80,150 L160,150 L160,130 L240,130 L240,100 L320,100 L320,75 L400,75 L400,68 L480,68 L480,55 L540,55"
              stroke="#fdba74" fill="none" stroke-width="2"/>
        <path d="M0,188 L80,186 L80,176 L160,176 L160,160 L240,160 L240,142 L320,142 L320,118 L400,118 L400,108 L480,108 L480,90 L540,90"
              stroke="#fdba74" fill="none" stroke-width="1.6" stroke-dasharray="0.1 5" stroke-linecap="round" stroke-opacity="0.95"/>
        <!-- session 3 (Medium) -->
        <path d="M0,185 L100,183 L100,170 L200,170 L200,150 L300,150 L300,140 L400,140 L400,135 L500,135 L500,128 L540,128"
              stroke="#fbbf24" fill="none" stroke-width="2"/>
        <!-- session 4 (Fast) -->
        <path d="M0,196 L120,195 L120,190 L240,190 L240,182 L360,182 L360,178 L480,178 L480,174 L540,174"
              stroke="#86efac" fill="none" stroke-width="2"/>

        <!-- LEFT axis (cumulative) — emphasized: thicker rule + dotted continuation up the axis -->
        <line x1="0" y1="0" x2="0" y2="200" stroke="#a1a1aa" stroke-width="1.25" stroke-dasharray="0.1 5" stroke-linecap="round" stroke-opacity="0.7"/>
        <!-- end-of-line tick markers per session on the LEFT axis (where cumulative ends visually) -->
        <g>
          <rect x="-2" y="71" width="4" height="2" fill="#fca5a5"/>
          <rect x="-2" y="89" width="4" height="2" fill="#fdba74"/>
        </g>

        <!-- bottom + right frame -->
        <line x1="0" y1="200" x2="540" y2="200" stroke="#3f3f46"/>
        <line x1="540" y1="0" x2="540" y2="200" stroke="#3f3f46"/>

        <!-- LEFT axis labels — neutral light (cumulative is neutral data) + axis title -->
        <g font-family="ui-monospace, monospace" font-size="11" fill="#a1a1aa" text-anchor="end">
          <text x="-8" y="4">2.4M</text>
          <text x="-8" y="44">1.8M</text>
          <text x="-8" y="84">1.2M</text>
          <text x="-8" y="124">600k</text>
          <text x="-8" y="164">300k</text>
          <text x="-8" y="204">0</text>
        </g>
        <text x="-46" y="100" transform="rotate(-90,-46,100)" font-family="Inter, sans-serif" font-size="10" fill="#a1a1aa" font-weight="600" letter-spacing="0.5" text-anchor="middle">
          ··· CUMULATIVE
        </text>

        <!-- RIGHT axis labels — band-tinted at threshold rows -->
        <g font-family="ui-monospace, monospace" font-size="11" text-anchor="start">
          <text x="548" y="4"   fill="#fca5a5">400k</text>
          <text x="548" y="64"  fill="#ef4444">300k</text>
          <text x="548" y="124" fill="#f97316">150k</text>
          <text x="548" y="164" fill="#eab308">50k</text>
          <text x="548" y="204" fill="#71717a">0</text>
        </g>
        <text x="588" y="100" transform="rotate(90,588,100)" font-family="Inter, sans-serif" font-size="10" fill="#f4f4f5" font-weight="600" letter-spacing="0.5" text-anchor="middle">
          ── CONTEXT
        </text>

        <!-- x labels -->
        <g font-family="Inter, sans-serif" font-size="11" fill="#a1a1aa" text-anchor="middle">
          <text x="0"   y="218">14:00</text>
          <text x="135" y="218">15:30</text>
          <text x="270" y="218">17:00</text>
          <text x="405" y="218">18:30</text>
          <text x="540" y="218">20:00</text>
        </g>
      </g>
    </svg>
  </div>
  <div class="legend-strokes">
    <span>
      <svg width="22" height="6"><line x1="0" y1="3" x2="22" y2="3" stroke="#d4d4d8" stroke-width="2"/></svg>
      <strong style="color:var(--fg-1)">Context</strong> &nbsp;solid · per-turn · right axis
    </span>
    <span>
      <svg width="22" height="6"><line x1="0" y1="3" x2="22" y2="3" stroke="#d4d4d8" stroke-width="1.6" stroke-dasharray="0.1 5" stroke-linecap="round"/></svg>
      <strong style="color:var(--fg-1)">Cumulative</strong> &nbsp;dotted · running sum · left axis
    </span>
    <span>
      <svg width="22" height="6"><line x1="0" y1="3" x2="22" y2="3" stroke="#f97316" stroke-width="1.5" stroke-dasharray="14 8"/></svg>
      <strong style="color:var(--fg-1)">Threshold</strong> &nbsp;long-dash · severity edge
    </span>
  </div>
</div>
</body></html>
