<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
:root {
  /* Project/session colors deliberately CONTRADICT severity to prove the
     severity reading (huge orange number, orange-tinted spark) holds on its own. */
  --proj: #67e8f9;            /* cyan project — opposite of orange severity */
  --proj-dim: rgba(103,232,249,0.55);
  --sess: #22d3ee;            /* cyan session shade */
  --sev: #f97316;             /* HIGH severity (orange) */
  --sev-bright: #fdba74;
}

.session-row {
  position: relative;
  height: 76px;
  border-radius: 10px;
  border: 1px solid #27272a;
  background: #0e0e10;
  overflow: hidden;
}

/* Sparkline + watermark + huge number all share the row container.
   Spark spans full row; number is bottom-right of the SAME container. */
.spark {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 0;
}
.spark svg { width: 100%; height: 100%; display: block; }

.bg-name {
  position: absolute;
  left: 56px; right: 12px; top: 6px;
  display: flex; align-items: center; justify-content: flex-end;
  color: var(--sess); opacity: 0.14;
  white-space: nowrap; line-height: 1;
  font-weight: 800; letter-spacing: -0.04em;
  font-size: 30px;
  pointer-events: none;
  z-index: 1;
}

/* Huge token number — bottom-right of the row container itself */
.ctx-num {
  position: absolute;
  right: 12px; bottom: 6px;
  z-index: 3;
  font-size: 26px; font-weight: 800;
  letter-spacing: -0.04em;
  color: var(--sev-bright);
  font-variant-numeric: tabular-nums;
  line-height: 1;
  text-shadow: 0 1px 6px rgba(0,0,0,0.85);
}
.ctx-num small {
  font-size: 14px; font-weight: 700;
  color: var(--sev); margin-left: 1px;
}

/* Two-column grid: status | main. No third column — the number floats over. */
.cols {
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: 48px 1fr;
  height: 100%;
  align-items: center;
}

/* — Column 1: status — */
.col-status {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
}
.dot {
  width: 11px; height: 11px; border-radius: 999px;
  background: #22c55e;
  box-shadow: 0 0 0 3px rgba(34,197,94,0.18);
}
.time {
  font-size: 10px; font-weight: 600;
  color: #d4d4d8;
  font-variant-numeric: tabular-nums;
  text-shadow: 0 1px 2px rgba(0,0,0,0.9);
}

/* — Column 2: main content stack — */
.col-main {
  display: flex; flex-direction: column;
  justify-content: center;
  gap: 3px;
  min-width: 0;
  padding: 6px 110px 6px 4px; /* right padding reserves room for the floating ctx-num */
}
.identity {
  display: flex; align-items: baseline; gap: 8px;
  font-size: 12.5px; min-width: 0;
}
.proj-name {
  font-weight: 600; color: var(--proj);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0;
}
.proj-name .dir { color: var(--proj-dim); font-weight: 500; }
.sess-id {
  font-family: var(--font-mono); color: var(--sess);
  font-weight: 600; font-size: 10.5px; flex-shrink: 0;
}

.tag-row {
  display: flex; align-items: center; gap: 4px;
  flex-wrap: nowrap;
  font-size: 9px;
}
.tag {
  font-weight: 600; padding: 1px 5px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: 0.04em;
  line-height: 1.4;
  white-space: nowrap;
}
.tag--active { color: #4ade80; background: rgba(34,197,94,0.18); }
.tag--cache  { color: #60a5fa; background: rgba(96,165,250,0.18); }
.tag--compact{ color: #a78bfa; background: rgba(167,139,250,0.18); }

.tail-line {
  font-size: 10.5px; color: #a1a1aa;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tail-line .lbl {
  color: #71717a; font-weight: 600;
  margin-right: 4px;
}

.role { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-vdim); font-weight: 600; margin-bottom: 8px; }
</style></head><body>
<div class="preview-card">
  <div class="role">Session row · number bottom-right of the spark container</div>

  <div class="session-row">
    <div class="spark">
      <svg viewBox="0 0 800 76" preserveAspectRatio="none">
        <defs>
          <!-- Area: severity-tinted (orange) — encodes how full the window is. -->
          <linearGradient id="areaGrad2" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%"  stop-color="#f97316" stop-opacity="0"/>
            <stop offset="70%" stop-color="#f97316" stop-opacity="0.10"/>
            <stop offset="100%" stop-color="#f97316" stop-opacity="0.32"/>
          </linearGradient>
          <!-- Line: project color (cyan) — encodes WHICH session, not how risky. -->
          <linearGradient id="lineGrad2" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%"  stop-color="#22d3ee" stop-opacity="0.15"/>
            <stop offset="60%" stop-color="#22d3ee" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#67e8f9" stop-opacity="1"/>
          </linearGradient>
        </defs>
        <path d="M0,68 L40,67 L96,65 L144,62 L192,59 L240,56 L296,52 L344,46 L392,48 L440,40 L488,36 L536,32 L584,27 L632,23 L680,18 L728,14 L776,10 L800,9 L800,76 L0,76 Z"
              fill="url(#areaGrad2)"/>
        <path d="M0,68 L40,67 L96,65 L144,62 L192,59 L240,56 L296,52 L344,46 L392,48 L440,40 L488,36 L536,32 L584,27 L632,23 L680,18 L728,14 L776,10 L800,9"
              fill="none" stroke="url(#lineGrad2)" stroke-width="2"/>
      </svg>
    </div>

    <div class="bg-name">claude-context-dashboard</div>

    <div class="ctx-num">218<small>k</small></div>

    <div class="cols">
      <div class="col-status">
        <span class="dot" title="active"></span>
        <span class="time">3m</span>
      </div>

      <div class="col-main">
        <div class="identity">
          <span class="proj-name"><span class="dir">~/code/work/x/</span>claude-context-dashboard</span>
          <span class="sess-id">a4f9c3b2</span>
        </div>
        <div class="tag-row">
          <span class="tag tag--active">active</span>
          <span class="tag tag--cache">cache-heavy</span>
          <span class="tag tag--compact">post-compact</span>
        </div>
        <div class="tail-line">
          <span class="lbl">reply:</span>refactor session row sparkline padding to match chart margins
        </div>
      </div>
    </div>
  </div>
</div>
</body></html>
